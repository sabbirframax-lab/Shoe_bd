<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout to MongoDB</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
            gap: 15px;
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        .item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #f3f4f6;
        }
        button {
            background: #ea580c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: background 0.2s;
        }
        button:hover { background: #c2410c; }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-add { width: auto; margin-top: 0; }
        
        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: inherit;
        }
        input[readonly] {
            background-color: #f9fafb;
            color: #6b7280;
            border-color: #e5e7eb;
        }
        .total {
            text-align: right;
            font-size: 1.25rem;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
        }
        #success-message {
            display: none;
            background: #dcfce7;
            color: #166534;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        #error-message {
            display: none;
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Store Checkout</h1>
    <div id="success-message">🎉 Order placed successfully! We will contact you soon.</div>
    <div id="error-message">❌ Failed to place order. Please try again.</div>
    
    <div class="container">
        <!-- Cart Section -->
        <div class="card">
            <h2>Your Cart</h2>
            <div id="cart-list"></div>
            <div class="total">
                <strong>Total: $<span id="cart-total">0.00</span></strong>
            </div>
            
            <h3 style="margin-top: 30px; font-size: 1rem;">Available Products</h3>
            <div id="products-list"></div>
        </div>

        <!-- Checkout Form Section -->
        <div class="card">
            <h2>Checkout Details</h2>
            
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="John Doe">
                </div>
                
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="+1 234 567 8900">
                </div>
                
                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" name="address" required rows="3" placeholder="123 Main St, City, Country"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="order-summary">Order Summary</label>
                    <input type="text" id="order-summary" readonly placeholder="Empty cart">
                </div>
                
                <div class="form-group">
                    <label for="order-total-input">Total Price</label>
                    <input type="text" id="order-total-input" readonly placeholder="$0.00">
                </div>

                <button type="submit" id="submit-btn">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. CART & PRODUCT LOGIC ---
        const products = [
            { 
                id: 1, 
                name: "Running Shoes", 
                price: 120, 
                image: "https://picsum.photos/seed/shoes1/150/150" 
            },
            { 
                id: 2, 
                name: "Classic Loafers", 
                price: 85, 
                image: "https://picsum.photos/seed/shoes2/150/150" 
            }
        ];
        
        let cart = JSON.parse(localStorage.getItem('checkout_cart')) || [];

        function renderProducts() {
            document.getElementById('products-list').innerHTML = products.map(p => `
                <div class="item">
                    <div class="item-info">
                        <img src="${p.image}" alt="${p.name}" referrerpolicy="no-referrer">
                        <div>
                            <strong>${p.name}</strong><br>
                            <span style="color: #666;">$${p.price}</span>
                        </div>
                    </div>
                    <button class="btn-add" type="button" onclick="addToCart(${p.id})">Add</button>
                </div>
            `).join('');
        }

        function renderCart() {
            const cartList = document.getElementById('cart-list');
            if (cart.length === 0) {
                cartList.innerHTML = '<div style="color:#666; padding: 10px 0;">Cart is empty</div>';
            } else {
                cartList.innerHTML = cart.map(item => `
                    <div class="item">
                        <div class="item-info">
                            <img src="${item.image}" alt="${item.name}" referrerpolicy="no-referrer">
                            <div>
                                <strong>${item.quantity}x ${item.name}</strong>
                            </div>
                        </div>
                        <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                    </div>
                `).join('');
            }

            // Calculate totals
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cart-total').textContent = total.toFixed(2);
            
            // Auto-fill the visible readonly form fields
            const orderSummary = cart.map(item => `${item.quantity}x ${item.name}`).join(', ');
            const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPriceStr = total.toFixed(2);

            document.getElementById('order-summary').value = orderSummary;
            document.getElementById('order-total-input').value = `$${totalPriceStr}`;
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.quantity += 1;
            else cart.push({ ...product, quantity: 1 });
            
            localStorage.setItem('checkout_cart', JSON.stringify(cart));
            renderCart();
        }

        function clearCart() {
            cart = [];
            localStorage.removeItem('checkout_cart');
            renderCart();
        }

        // Initialize UI
        renderProducts();
        renderCart();


        // --- 2. BACKEND INTEGRATION LOGIC (MongoDB) ---
        const form = document.getElementById('checkout-form');
        const submitBtn = document.getElementById('submit-btn');
        const successMessage = document.getElementById('success-message');
        const errorMessage = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (cart.length === 0) {
                alert("Your cart is empty! Please add items before checking out.");
                return;
            }

            submitBtn.textContent = 'Processing...';
            submitBtn.disabled = true;
            successMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            
            // Prepare data for MongoDB backend
            const orderSummary = cart.map(item => `${item.quantity}x ${item.name}`).join(', ');
            const imageUrls = JSON.stringify(cart.map(item => item.image));
            const totalQuantity = cart.reduce((sum, item) => sum + item.quantity, 0);
            const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0).toFixed(2);

            const orderData = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                address: document.getElementById('address').value,
                productName: orderSummary,
                productImage: imageUrls,
                quantity: totalQuantity,
                totalPrice: totalPrice
            };

            try {
                // Send POST request to our Node.js backend
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(orderData)
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    successMessage.style.display = 'block';
                    form.reset();
                    clearCart();
                    window.scrollTo(0, 0);
                    
                    setTimeout(() => {
                        successMessage.style.display = 'none';
                    }, 5000);
                } else {
                    throw new Error(result.message || 'Failed to place order');
                }
            } catch (error) {
                console.error('Error!', error);
                errorMessage.textContent = '❌ ' + (error.message || 'Failed to place order. Please try again.');
                errorMessage.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Place Order';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
